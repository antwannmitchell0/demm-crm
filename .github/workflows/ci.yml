name: DEMM CRM Security & Quality CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    name: Build & Security Audit
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: demm_crm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: cd backend && npm ci

      - name: Prisma Validate & Generate
        run: cd backend && npx prisma validate && npx prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:postgrespassword@localhost:5432/demm_crm?schema=public"

      - name: Sync Database Schema
        run: cd backend && npx prisma db push
        env:
          DATABASE_URL: "postgresql://postgres:postgrespassword@localhost:5432/demm_crm?schema=public"

      - name: Build Backend
        run: cd backend && npm run build
        env:
          JWT_SECRET: "demm_crm_production_secure_jwt_secret_key_32chars_minimum"

      - name: Execute Verification Suite
        run: cd backend && npm run verify
        env:
          DATABASE_URL: "postgresql://postgres:postgrespassword@localhost:5432/demm_crm?schema=public"
          JWT_SECRET: "demm_crm_production_secure_jwt_secret_key_32chars_minimum"
